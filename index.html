<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaviWorld Prompt Library — ERP Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0B1120;
  --navy2: #111827;
  --navy3: #1a2540;
  --surface: #1e2d45;
  --surface2: #243352;
  --border: rgba(100,140,200,0.12);
  --border2: rgba(100,140,200,0.22);
  --gold: #F5A623;
  --gold2: #e8962a;
  --blue: #4A9FE8;
  --blue2: #3d8fd8;
  --green: #34D399;
  --red: #F87171;
  --purple: #A78BFA;
  --orange: #FB923C;
  --teal: #2DD4BF;
  --white: #F0F4FF;
  --muted: #6B84A8;
  --muted2: #8BA4C4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* Ambient background */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 60% at 20% 10%,rgba(74,159,232,0.07) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 80%,rgba(245,166,35,0.05) 0%,transparent 60%),
  radial-gradient(ellipse 40% 40% at 50% 50%,rgba(52,211,153,0.03) 0%,transparent 70%);
pointer-events:none;z-index:0;}

/* Layout */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;position:relative;z-index:1;}

/* ─── SIDEBAR ─── */
.sidebar{background:var(--navy2);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:99px;}

.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#e8962a);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;line-height:1.2;}
.logo-text small{display:block;font-size:10px;font-weight:400;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-family:'DM Mono',monospace;}

/* Search */
.search-wrap{position:relative;}
.search-input{width:100%;padding:9px 12px 9px 36px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .18s;}
.search-input:focus{border-color:var(--blue);}
.search-input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.search-count{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* Group nav */
.sidebar-nav{flex:1;padding:12px 10px;}
.group-section{margin-bottom:4px;}
.group-btn{width:100%;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent;background:transparent;color:var(--white);text-align:left;}
.group-btn:hover{background:rgba(74,159,232,0.06);border-color:rgba(74,159,232,0.15);}
.group-btn.active{background:rgba(74,159,232,0.1);border-color:rgba(74,159,232,0.25);}
.group-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.group-info{flex:1;min-width:0;}
.group-name{font-size:12px;font-weight:600;font-family:'Syne',sans-serif;}
.group-count{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.group-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.group-btn.open .group-chevron{transform:rotate(90deg);}

.prompt-list{display:none;padding:2px 0 4px 37px;}
.group-btn.open + .prompt-list{display:block;}
.prompt-nav-item{display:block;padding:5px 8px;border-radius:6px;font-size:11px;color:var(--muted2);cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:none;background:transparent;width:100%;text-align:left;}
.prompt-nav-item:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.prompt-nav-item.active{color:var(--blue);font-weight:500;}

.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);}
.version-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;}
.stat-row{display:flex;gap:12px;margin-top:8px;}
.stat-item{text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gold);}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;}

/* ─── MAIN ─── */
.main{display:flex;flex-direction:column;min-height:100vh;}

/* Topbar */
.topbar{padding:16px 36px;border-bottom:1px solid var(--border);background:rgba(11,17,32,.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.breadcrumb .sep{color:var(--border2);}
.breadcrumb .current{color:var(--white);font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .17s;text-decoration:none;letter-spacing:.01em;}
.btn-primary{background:var(--gold);color:#0B1120;}
.btn-primary:hover{background:#f0b340;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--white);}

/* Content area */
.content{flex:1;padding:32px 36px;}

/* Overview Hero */
.overview-hero{background:linear-gradient(135deg,var(--surface) 0%,var(--navy3) 100%);border:1px solid var(--border2);border-radius:16px;padding:32px 36px;margin-bottom:32px;position:relative;overflow:hidden;}
.overview-hero::before{content:'ERP';position:absolute;right:-20px;top:-30px;font-family:'Syne',sans-serif;font-size:140px;font-weight:800;color:rgba(74,159,232,0.04);letter-spacing:-.05em;pointer-events:none;user-select:none;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.hero-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px;line-height:1.2;}
.hero-sub{font-size:14px;color:var(--muted2);max-width:580px;line-height:1.7;}
.hero-meta{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;}
.hero-stat{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted2);}
.hero-stat strong{color:var(--white);font-weight:700;}

/* Group color dots */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}

/* Prompt card */
.prompt-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s;overflow:hidden;position:relative;}
.prompt-card::before{content:'';position:absolute;inset:0;opacity:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(74,159,232,0.08),transparent 65%);transition:opacity .3s;pointer-events:none;}
.prompt-card:hover::before{opacity:1;}
.prompt-card:hover{border-color:rgba(74,159,232,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.card-header{padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;}
.card-group-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 7px;border-radius:4px;letter-spacing:.06em;font-weight:500;flex-shrink:0;}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;padding:0 20px 10px;line-height:1.35;}
.card-desc{font-size:12px;color:var(--muted2);padding:0 20px 16px;line-height:1.6;}
.card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(74,159,232,0.08);color:var(--blue);font-family:'DM Mono',monospace;border:1px solid rgba(74,159,232,0.15);}
.card-cta{font-size:11px;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:3px;transition:gap .15s;}
.prompt-card:hover .card-cta{gap:7px;}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:9px;}
.section-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* ─── DETAIL VIEW ─── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;display:flex;opacity:0;pointer-events:none;transition:opacity .25s;}
.detail-overlay.open{opacity:1;pointer-events:all;}
.detail-panel{background:var(--navy2);border-left:1px solid var(--border2);width:100%;max-width:720px;margin-left:auto;overflow-y:auto;display:flex;flex-direction:column;transform:translateX(40px);transition:transform .25s;}
.detail-overlay.open .detail-panel{transform:translateX(0);}
.detail-panel::-webkit-scrollbar{width:4px;}
.detail-panel::-webkit-scrollbar-thumb{background:var(--surface2);}

.detail-topbar{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--navy2);z-index:5;}
.detail-close{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;flex-shrink:0;}
.detail-close:hover{color:var(--white);border-color:var(--border2);}
.detail-breadcrumb{font-size:12px;color:var(--muted);flex:1;}
.detail-breadcrumb strong{color:var(--white);}

.detail-body{padding:28px;}
.detail-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.detail-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:14px;line-height:1.25;}
.detail-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.detail-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted2);background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid var(--border);}

.detail-section{margin-bottom:22px;}
.detail-section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.detail-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.when-box{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 9px 9px 0;padding:12px 14px;font-size:13px;color:var(--muted2);line-height:1.6;}

.input-list{display:flex;flex-direction:column;gap:5px;}
.input-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted2);}
.input-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* Prompt box */
.prompt-box{background:var(--navy);border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
.prompt-box-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.prompt-box-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;}
.copy-btn{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);cursor:pointer;background:transparent;border:none;transition:color .15s;padding:2px 6px;border-radius:4px;}
.copy-btn:hover{background:rgba(74,159,232,0.1);}
.prompt-content{padding:16px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:rgba(240,244,255,0.85);white-space:pre-wrap;max-height:480px;overflow-y:auto;}
.prompt-content::-webkit-scrollbar{width:3px;}
.prompt-content::-webkit-scrollbar-thumb{background:var(--surface2);}

/* Highlight placeholders in prompt */
.ph{color:var(--gold);background:rgba(245,166,35,0.08);border-radius:3px;padding:0 2px;}

.output-list{display:flex;flex-direction:column;gap:6px;}
.output-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:rgba(240,244,255,0.75);line-height:1.5;}
.output-check{width:16px;height:16px;border-radius:4px;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--green);flex-shrink:0;margin-top:1px;}

.tip-box{background:rgba(74,159,232,0.06);border:1px solid rgba(74,159,232,0.2);border-radius:9px;padding:12px 14px;display:flex;gap:9px;}
.tip-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.tip-text{font-size:12px;color:var(--muted2);line-height:1.6;}

.detail-actions{display:flex;gap:10px;padding:20px 28px;border-top:1px solid var(--border);}

/* ADMIN MODE */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.admin-overlay.open{opacity:1;pointer-events:all;}
.admin-modal{background:var(--navy2);border:1px solid var(--border-active,rgba(245,166,35,0.3));border-radius:18px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:28px;transform:translateY(20px);transition:transform .25s;}
.admin-overlay.open .admin-modal{transform:translateY(0);}
.admin-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.admin-modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;}
.admin-subtitle{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.form-input,.form-textarea,.form-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .18s;width:100%;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--gold);}
.form-textarea{min-height:140px;resize:vertical;line-height:1.6;font-family:'DM Mono',monospace;font-size:12px;}
.form-select option{background:var(--navy2);}
.admin-footer{display:flex;gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}

/* AUTH */
.auth-lock{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}
.auth-icon{font-size:36px;margin-bottom:16px;opacity:.5;}
.auth-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px;}
.auth-desc{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6;}
.auth-input{background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--white);font-family:'DM Mono',monospace;font-size:14px;padding:10px 14px;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:12px;width:220px;transition:border-color .18s;}
.auth-input:focus{border-color:var(--gold);}
.auth-input.err{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{border-color:rgba(52,211,153,0.4);}

/* Filter bar */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{padding:5px 13px;border-radius:99px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;background:transparent;font-family:'DM Mono',monospace;}
.filter-btn:hover{border-color:rgba(74,159,232,0.4);color:var(--white);}
.filter-btn.active{background:var(--blue);color:var(--navy);border-color:var(--blue);}

/* No results */
.no-results{text-align:center;padding:60px 20px;color:var(--muted);}
.no-results-icon{font-size:36px;margin-bottom:12px;opacity:.4;}
.no-results-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;color:var(--white);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.prompt-card{animation:fadeUp .35s both;}
.prompt-card:nth-child(1){animation-delay:.03s}.prompt-card:nth-child(2){animation-delay:.06s}
.prompt-card:nth-child(3){animation-delay:.09s}.prompt-card:nth-child(4){animation-delay:.12s}
.prompt-card:nth-child(5){animation-delay:.15s}.prompt-card:nth-child(6){animation-delay:.18s}
.prompt-card:nth-child(7){animation-delay:.21s}.prompt-card:nth-child(8){animation-delay:.24s}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:99px}

@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.content{padding:20px}}
</style>
</head>
<body>
<div class="app">

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">NaviWorld<small>Prompt Intelligence</small></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="sidebarSearch" placeholder="Tìm kiếm prompt..." oninput="handleSearch(this.value)">
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>

  <nav class="sidebar-nav" id="sidebarNav"></nav>

  <div class="sidebar-footer">
    <div class="version-tag">ERP Prompt Library v1.0 · 04/2026</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-num">53</div><div class="stat-label">Prompts</div></div>
      <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">Nhóm</div></div>
      <div class="stat-item"><div class="stat-num">∞</div><div class="stat-label">Use cases</div></div>
    </div>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div class="breadcrumb">
        <span>NaviWorld</span><span class="sep">›</span>
        <span class="current" id="topbarTitle">Tất cả Prompts</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="openAdmin()">⚙️ Admin</button>
      <button class="btn btn-primary" onclick="openNewPrompt()">+ Thêm Prompt</button>
    </div>
  </header>

  <div class="content" id="mainContent">
    <!-- Rendered by JS -->
  </div>
</main>
</div>

<!-- ═══ DETAIL PANEL ═══ -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-topbar">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-breadcrumb" id="detailBreadcrumb">—</div>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentGroup = 'all';
let searchQuery = '';
let currentPromptId = null;
let adminUnlocked = false;
let editingId = null;
let prompts = JSON.parse(localStorage.getItem('nw_prompts') || 'null') || JSON.parse(JSON.stringify(PROMPTS));
const ADMIN_PW = localStorage.getItem('nw_admin_pw') || 'naviworld2026';

function savePrompts() { localStorage.setItem('nw_prompts', JSON.stringify(prompts)); }

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const q = searchQuery.toLowerCase();

  let html = `<div class="group-section">
    <button class="group-btn ${currentGroup==='all'?'active':''}" onclick="setGroup('all')">
      <div class="group-icon" style="background:rgba(74,159,232,0.12);font-size:14px">🔮</div>
      <div class="group-info"><div class="group-name">Tất cả</div><div class="group-count">${prompts.length} prompts</div></div>
    </button>
  </div>`;

  GROUPS.forEach(g => {
    const gPrompts = prompts.filter(p => p.group === g.id);
    const isOpen = currentGroup === g.id || (q && gPrompts.some(p => matchSearch(p,q)));
    const isActive = currentGroup === g.id;
    html += `<div class="group-section">
      <button class="group-btn ${isActive?'active':''} ${isOpen?'open':''}" onclick="toggleGroup('${g.id}')">
        <div class="group-icon" style="background:${g.bg}">${g.icon}</div>
        <div class="group-info"><div class="group-name">${g.label}</div><div class="group-count">${gPrompts.length} prompts</div></div>
        <span class="group-chevron">›</span>
      </button>
      <div class="prompt-list">${gPrompts.map(p=>`
        <button class="prompt-nav-item ${currentPromptId===p.id?'active':''}" onclick="openDetail(${p.id})">${p.num}: ${p.title}</button>
      `).join('')}</div>
    </div>`;
  });

  nav.innerHTML = html;
}

function toggleGroup(groupId) {
  if (currentGroup === groupId) { currentGroup = 'all'; }
  else { currentGroup = groupId; }
  renderSidebar();
  renderMain();
  document.getElementById('topbarTitle').textContent = currentGroup === 'all' ? 'Tất cả Prompts' :
    GROUPS.find(g=>g.id===currentGroup)?.label || 'Tất cả';
}

function setGroup(g) {
  currentGroup = g;
  renderSidebar();
  renderMain();
  document.getElementById('topbarTitle').textContent = g === 'all' ? 'Tất cả Prompts' :
    GROUPS.find(x=>x.id===g)?.label || 'Tất cả';
}

// ═══════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════
function matchSearch(p, q) {
  return p.title.toLowerCase().includes(q) || p.num.toLowerCase().includes(q) ||
    p.when.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q) ||
    GROUPS.find(g=>g.id===p.group)?.label.toLowerCase().includes(q);
}
function handleSearch(val) {
  searchQuery = val.trim();
  currentGroup = 'all';
  renderMain();
  renderSidebar();
  const matched = prompts.filter(p=>!searchQuery||matchSearch(p,searchQuery.toLowerCase()));
  document.getElementById('searchCount').textContent = searchQuery ? matched.length : '';
}

// ═══════════════════════════════════════════
// MAIN CONTENT
// ═══════════════════════════════════════════
function renderMain() {
  const q = searchQuery.toLowerCase();
  const filtered = prompts.filter(p => {
    const groupMatch = currentGroup === 'all' || p.group === currentGroup;
    const searchMatch = !q || matchSearch(p, q);
    return groupMatch && searchMatch;
  });

  let html = '';

  if (currentGroup === 'all' && !searchQuery) {
    html += renderHero();
  }

  if (filtered.length === 0) {
    html += `<div class="no-results"><div class="no-results-icon">🔍</div><div class="no-results-title">Không tìm thấy kết quả</div><div>Thử từ khóa khác hoặc xem tất cả prompts</div></div>`;
  } else {
    if (currentGroup === 'all' && !searchQuery) {
      GROUPS.forEach(g => {
        const gp = filtered.filter(p => p.group === g.id);
        if (!gp.length) return;
        html += `<div class="section-header"><div class="section-title"><span style="width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;background:${g.bg};font-size:12px">${g.icon}</span> ${g.label}</div><div class="section-count">${gp.length} prompts</div></div>`;
        html += `<div class="cards-grid" style="margin-bottom:32px">${gp.map(p=>renderCard(p)).join('')}</div>`;
      });
    } else {
      const groupName = currentGroup !== 'all' ? GROUPS.find(g=>g.id===currentGroup)?.label : '';
      if (searchQuery) html += `<div class="section-header"><div class="section-title">🔍 Kết quả tìm kiếm "${searchQuery}"</div><div class="section-count">${filtered.length} kết quả</div></div>`;
      else if (groupName) html += `<div class="section-header"><div class="section-title">${GROUPS.find(g=>g.id===currentGroup)?.icon} ${groupName}</div><div class="section-count">${filtered.length} prompts</div></div>`;
      html += `<div class="cards-grid">${filtered.map(p=>renderCard(p)).join('')}</div>`;
    }
  }

  document.getElementById('mainContent').innerHTML = html;
  // Glow effect
  document.querySelectorAll('.prompt-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
      card.style.setProperty('--my', ((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
    });
  });
}

function renderHero() {
  return `<div class="overview-hero">
    <div class="hero-eyebrow">NaviWorld ERP · Prompt Intelligence Platform</div>
    <h1 class="hero-title">NaviWorld Prompt Library</h1>
    <p class="hero-sub">Hệ thống prompt chuẩn hóa cho toàn bộ nghiệp vụ công ty ERP — Sales, Proposal, Forecast, Coaching, Learning, Quản trị Dự án, Business Case, và Kỹ thuật phát triển giải pháp BC/FO. 53 prompts, 8 nhóm, dùng được ngay.</p>
    <div class="hero-meta">
      <div class="hero-stat"><span class="dot" style="background:#F5A623"></span>A. Sales: <strong>8</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#4A9FE8"></span>B. Proposal: <strong>6</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#34D399"></span>C. Forecast: <strong>6</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#A78BFA"></span>D. Coaching: <strong>5</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#2DD4BF"></span>E. Learning: <strong>5</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#FB923C"></span>F. PM: <strong>8</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#F87171"></span>G. Business Case: <strong>5</strong></div>
      <div class="hero-stat"><span class="dot" style="background:#38BDF8"></span>H. Kỹ Thuật & Dev: <strong>10</strong></div>
    </div>
  </div>`;
}

function renderCard(p) {
  const g = GROUPS.find(x=>x.id===p.group);
  return `<div class="prompt-card" onclick="openDetail(${p.id})">
    <div class="card-header">
      <div class="card-num">${p.num}</div>
      <span class="card-group-badge" style="background:${g?.bg};color:${g?.color}">${g?.label||p.group}</span>
    </div>
    <div class="card-title">${p.title}</div>
    <div class="card-desc">${p.when}</div>
    <div class="card-footer">
      <div class="card-tags">${(p.inputs||[]).slice(0,2).map(i=>`<span class="tag">${i.split('(')[0].trim()}</span>`).join('')}</div>
      <span class="card-cta">Xem →</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════
function openDetail(id) {
  const p = prompts.find(x=>x.id===id);
  if (!p) return;
  currentPromptId = id;
  renderSidebar();
  const g = GROUPS.find(x=>x.id===p.group);
  document.getElementById('detailBreadcrumb').innerHTML = `<strong>${p.num}</strong> · ${g?.label||p.group}`;
  document.getElementById('detailEditBtn').style.display = adminUnlocked ? 'flex' : 'none';

  // Highlight placeholders
  const highlightedPrompt = p.prompt.replace(/\[([^\]]+)\]/g, '<span class="ph">[$1]</span>');

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-eyebrow">${p.num} · ${g?.label||p.group}</div>
    <div class="detail-title">${p.title}</div>
    <div class="detail-meta">
      <div class="detail-meta-item">📋 ${(p.inputs||[]).length} đầu vào</div>
      <div class="detail-meta-item">✅ ${(p.outputs||[]).length} đầu ra</div>
      <div class="detail-meta-item" style="color:${g?.color}">●&nbsp;${g?.label||''}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Dùng khi nào</div>
      <div class="when-box">${p.when}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Đầu vào cần chuẩn bị</div>
      <div class="input-list">${(p.inputs||[]).map(i=>`<div class="input-item"><div class="input-dot"></div>${i}</div>`).join('')}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Prompt</div>
      <div class="prompt-box">
        <div class="prompt-box-header">
          <span class="prompt-box-label">PROMPT · Điền các phần [trong ngoặc vuông]</span>
          <button class="copy-btn" onclick="copyPrompt(${p.id})">📋 Copy</button>
        </div>
        <div class="prompt-content">${highlightedPrompt}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Đầu ra mong đợi</div>
      <div class="output-list">${(p.outputs||[]).map(o=>`<div class="output-item"><div class="output-check">✓</div>${o}</div>`).join('')}</div>
    </div>
    ${p.tip?`<div class="detail-section">
      <div class="detail-section-title">Mẹo chỉnh nhanh</div>
      <div class="tip-box"><div class="tip-icon">💡</div><div class="tip-text">${p.tip}</div></div>
    </div>`:''}`;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentPromptId = null;
  renderSidebar();
}

function copyPrompt(id) {
  const p = prompts.find(x=>x.id===id);
  if (!p) return;
  navigator.clipboard.writeText(p.prompt).then(() => showToast('success','✓','Đã copy prompt!'));
}
function copyCurrentPrompt() { if (currentPromptId) copyPrompt(currentPromptId); }
function editCurrentPrompt() { if (currentPromptId) { closeDetail(); openAdminForm(currentPromptId); } }

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function openAdmin() {
  const m = document.getElementById('adminModal');
  if (!adminUnlocked) {
    m.innerHTML = `<div class="auth-lock">
      <div class="auth-icon">🔐</div>
      <div class="auth-title">Admin Panel</div>
      <div class="auth-desc">Nhập mật khẩu để chỉnh sửa nội dung prompt</div>
      <input type="password" class="auth-input" id="authInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAdmin()">
      <button class="btn btn-primary" style="width:220px" onclick="checkAdmin()">Đăng nhập</button>
      <div style="margin-top:10px;font-size:11px;color:#6B84A8">Mặc định: <span style="font-family:'DM Mono',monospace;color:var(--gold)">naviworld2026</span></div>
    </div>`;
  } else {
    renderAdminList();
  }
  document.getElementById('adminOverlay').classList.add('open');
}

function checkAdmin() {
  const v = document.getElementById('authInput').value;
  if (v === ADMIN_PW || v === localStorage.getItem('nw_admin_pw') || v === 'naviworld2026') {
    adminUnlocked = true;
    renderAdminList();
    showToast('success','✓','Đăng nhập thành công!');
  } else {
    const inp = document.getElementById('authInput');
    inp.classList.add('err'); inp.value = '';
    setTimeout(()=>inp.classList.remove('err'),500);
  }
}

function renderAdminList() {
  const m = document.getElementById('adminModal');
  m.innerHTML = `
    <div class="admin-modal-header">
      <div><div class="admin-subtitle">Admin Panel</div><div class="admin-modal-title">Quản lý Prompt Library</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="openNewPrompt()">+ Thêm mới</button>
        <button class="admin-icon-btn" onclick="closeAdmin()" style="width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto">
      ${prompts.map(p=>{
        const g=GROUPS.find(x=>x.id===p.group);
        return `<div style="display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px">
          <span style="font-size:13px;flex-shrink:0">${g?.icon||'📄'}</span>
          <div style="flex:1;min-width:0">

            <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">${g?.label||p.group}</div>
          </div>
          <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px;flex-shrink:0" onclick="closeAdmin();openAdminForm(${p.id})">✏️ Sửa</button>
          <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px;flex-shrink:0;color:var(--red);border-color:rgba(248,113,113,0.3)" onclick="deletePrompt(${p.id})">🗑</button>
        </div>`;
      }).join('')}

    <div class="admin-footer" style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">

        <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em">Đổi mật khẩu</div>
        <div style="display:flex;gap:6px">
          <input type="password" id="newPwInp" placeholder="Mật khẩu mới" style="background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--white);font-size:12px;padding:6px 10px;outline:none;flex:1">
          <button class="btn btn-ghost" style="font-size:11px" onclick="changePw()">Lưu</button>
        </div>
      </div>
    </div>`;
}

function changePw() {
  const v = document.getElementById('newPwInp')?.value.trim();
  if (!v||v.length<4){showToast('error','✕','Ít nhất 4 ký tự');return;}
  localStorage.setItem('nw_admin_pw',v);
  showToast('success','✓','Đã đổi mật khẩu!');
}

function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }

function openNewPrompt() { closeAdmin(); openAdminForm(null); }

      </div>
    </div>
    <div class="admin-footer">
      <button class="btn btn-primary" style="flex:1" onclick="savePromptForm()">💾 Lưu</button>
      <button class="btn btn-ghost" onclick="closeAdmin()">Hủy</button>
    </div>`;
  document.getElementById('adminOverlay').classList.add('open');
}

function savePromptForm() {
  const title = document.getElementById('fTitle').value.trim();
  const prompt = document.getElementById('fPrompt').value.trim();
  if (!title||!prompt){showToast('error','✕','Cần nhập tiêu đề và prompt');return;}
  const data = {
    id: editingId || (Math.max(...prompts.map(p=>p.id),0)+1),
    num: document.getElementById('fNum').value.trim(),
    group: document.getElementById('fGroup').value,
    title,
    when: document.getElementById('fWhen').value.trim(),
    inputs: document.getElementById('fInputs').value.split('\n').map(s=>s.trim()).filter(Boolean),
    prompt,
    outputs: document.getElementById('fOutputs').value.split('\n').map(s=>s.trim()).filter(Boolean),
    tip: document.getElementById('fTip').value.trim(),
  };
  if (editingId) {
    const idx = prompts.findIndex(p=>p.id===editingId);
    if (idx>-1) prompts[idx]=data;
    showToast('success','✓','Đã cập nhật prompt!');
  } else {
    prompts.push(data);
    showToast('success','✓','Đã thêm prompt mới!');
  }
  savePrompts(); closeAdmin(); renderAll();
}

function deletePrompt(id) {
  const p = prompts.find(x=>x.id===id);
  if (!confirm(`Xóa "${p?.title}"? Không thể hoàn tác.`)) return;
  prompts = prompts.filter(x=>x.id!==id);
  savePrompts(); renderAdminList(); renderAll();
  showToast('success','✓','Đã xóa prompt');
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function showToast(type, icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'),2800);
}

function renderAll() { renderSidebar(); renderMain(); }

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){closeDetail();closeAdmin();}
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderAll();
</script>
</body>
